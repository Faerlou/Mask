<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Маска на лицо</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #000;
      touch-action: none;
      height: 100vh;
      width: 100vw;
      position: fixed;
    }
    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #000;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      -webkit-transform: scaleX(-1);
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      -webkit-transform: scaleX(-1);
      pointer-events: none;
    }
    #status {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      font-family: -apple-system, Arial, sans-serif;
      text-shadow: 0 0 20px rgba(0,0,0,0.9);
      font-size: 16px;
      padding: 12px 24px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      max-width: 90%;
    }
    /* ===== КНОПКА — ИСПРАВЛЕНА ===== */
    #startBtn {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      padding: 18px 50px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 4px 30px rgba(0,122,255,0.6);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      /* Обязательно для клика на iOS */
      pointer-events: auto;
      display: block;
      min-width: 200px;
      letter-spacing: 0.5px;
    }
    #startBtn:active {
      transform: translateX(-50%) scale(0.95);
      background: #0055CC;
    }
    /* Стиль для скрытой кнопки */
    #startBtn.hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div id="container">
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">👆 Нажмите кнопку для запуска</div>
  <button id="startBtn">▶ Запустить AR</button>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // ============================================================
  // 1. НАСТРОЙКИ
  // ============================================================
  const MODEL_URL = 'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf';

  // ============================================================
  // 2. ЭЛЕМЕНТЫ
  // ============================================================
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('startBtn');

  let model = null;
  let faceMesh = null;
  let cameraHelper = null;
  let isRunning = false;

  // ============================================================
  // 3. THREE.JS СЦЕНА
  // ============================================================
const scene = new THREE.Scene();
  
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(0, 1, 2);
  scene.add(dirLight);
  const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
  backLight.position.set(0, 0, -1);
  scene.add(backLight);

  const camera3D = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: canvas, 
    alpha: true, 
    antialias: true 
  });

  // ============================================================
  // 4. ЗАГРУЗКА МОДЕЛИ
  // ============================================================
  function loadModel() {
    statusEl.textContent = '⏳ Загрузка модели...';
    
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    script.onload = () => {
      const loader = new THREE.GLTFLoader();
      loader.load(MODEL_URL, (gltf) => {
        model = gltf.scene;
        model.scale.set(2.5, 2.5, 2.5);
        scene.add(model);
        statusEl.textContent = '✅ Маска загружена! Наведите камеру на лицо';
      }, undefined, (err) => {
        statusEl.textContent = '❌ Ошибка загрузки: ' + err.message;
      });
    };
    document.head.appendChild(script);
  }

  // ============================================================
  // 5. ЗАПУСК КАМЕРЫ
  // ============================================================
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: 'user',
          width: { ideal: 640 },
          height: { ideal: 480 }
        }
      });
      
      video.srcObject = stream;
      await video.play();
      
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      renderer.setSize(canvas.width, canvas.height);
      camera3D.aspect = canvas.width / canvas.height;
      camera3D.updateProjectionMatrix();
      
      statusEl.textContent = '📷 Камера запущена';
      return true;
    } catch(e) {
      statusEl.textContent = '❌ Ошибка: ' + e.message;
      return false;
    }
  }

  // ============================================================
  // 6. MEDIAPIPE
  // ============================================================
  function initFaceMesh() {
    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults((results) => {
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        const nose = landmarks[1];
        const chin = landmarks[152];
        const forehead = landmarks[10];

        const cx = (forehead.x + chin.x) / 2;
        const cy = (forehead.y + chin.y) / 2;
        const cz = (forehead.z + chin.z) / 2;

        const headSize = Math.sqrt(
          Math.pow(forehead.x - chin.x, 2) +
          Math.pow(forehead.y - chin.y, 2) +
          Math.pow(forehead.z - chin.z, 2)
        );

        const noseDir = {
          x: nose.x - cx,
          y: nose.y - cy,
          z: nose.z - cz
        };

        if (model) {
          const scale = 2.0;
          model.position.set(
            (cx - 0.5) * 2 * scale,
            -(cy - 0.5) * 2 * scale,
            cz * 5 - 0.5
          );
          const s = headSize * 4.5;
          model.scale.set(s, s, s);
          model.rotation.set(
            Math.atan2(noseDir.y, noseDir.z) * 0.5,
            -Math.atan2(noseDir.x, noseDir.z) * 0.5,
              0
          );
        }

        statusEl.textContent = '😊 
 Лицо найдено!';
      } else {
        statusEl.textContent = '😐 Лицо не обнаружено';
      }

      renderer.render(scene, camera3D);
    });
  }

  // ============================================================
  // 7. ЗАПУСК MEDIAPIPE КАМЕРЫ
  // ============================================================
  function startMediaPipe() {
    cameraHelper = new Camera(video, {
      onFrame: async () => {
        if (faceMesh) {
          await faceMesh.send({ image: video });
        }
      },
      width: 640,
      height: 480
    });
    cameraHelper.start();
  }

  // ============================================================
  // 8. ГЛАВНАЯ ФУНКЦИЯ ЗАПУСКА
  // ============================================================
  async function init() {
    if (isRunning) return;
    isRunning = true;
    
    // Скрываем кнопку
    startBtn.classList.add('hidden');
    statusEl.textContent = '📷 Запуск камеры...';
    
    const cameraOk = await startCamera();
    if (!cameraOk) {
      startBtn.classList.remove('hidden');
      isRunning = false;
      return;
    }

    initFaceMesh();
    loadModel();
    startMediaPipe();
  }

  // ============================================================
  // 9. ОБРАБОТЧИК КНОПКИ (исправлен)
  // ============================================================
  // Убираем все возможные блокировки
  startBtn.addEventListener('touchstart', function(e) {
    e.preventDefault(); // Предотвращаем прокрутку
    e.stopPropagation();
    init();
  }, { passive: false });

  startBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    init();
  });

  // Дополнительно: обработка на случай, если что-то перехватывает
  document.addEventListener('touchstart', function(e) {
    // Если клик по кнопке — игнорируем остальные обработчики
    if (e.target === startBtn) {
      e.stopPropagation();
    }
  }, { passive: true });

  console.log('📱 
 Приложение готово. Нажмите кнопку.');
</script>

</body>
</html>
