
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Маска на лицо</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Зеркало для селфи */
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    #status {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="status">🔍 Инициализация камеры...</div>
</div>

<!-- Загружаем MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<!-- Трёхмерный движок (лёгкий) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // ============================================================
  // 1. НАСТРОЙКИ — замените путь на свою модель .glb
  // ============================================================
  const MODEL_URL = 'mask.gltf';
  // Для маски лучше использовать .gltf или .glb
  // Если у вас .glb — используйте GLTFLoader (см. ниже)

  // ============================================================
  // 2. ПОДКЛЮЧАЕМ КАМЕРУ
  // ============================================================
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: 640, height: 480 }
      });
      video.srcObject = stream;
      await video.play();
      document.getElementById('status').textContent = '📷 Камера включена, ждите распознавания...';
      return true;
    } catch(e) {
      document.getElementById('status').textContent = '❌ Ошибка камеры: ' + e.message;
      return false;
    }
  }

  // ============================================================
  // 3. НАСТРАИВАЕМ MEDIAPIPE FACE MESH
  // ============================================================
  const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5
  });

  // ============================================================
  // 4. THREE.JS — СЦЕНА С МАСКОЙ
  // ============================================================
  const scene = new THREE.Scene();
  const camera3D = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: canvas, 
    alpha: true, 
    antialias: true 
  });

  // Освещение
  const ambient = new THREE.AmbientLight(0xffffff, 0.8);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(0, 1, 2);
  scene.add(dirLight);

  let model = null;

  // Загрузка модели (GLTF/GLB)
  const loader = new THREE.GLTFLoader();
  loader.load(MODEL_URL, (gltf) => {
    model = gltf.scene;
    // Масштабируем под размер головы
    model.scale.set(2.5, 2.5, 2.5);
scene.add(model);
    document.getElementById('status').textContent = '✅ Маска загружена!';
  }, undefined, (err) => {
    document.getElementById('status').textContent = '⚠️ 
 Ошибка загрузки модели';
    console.error(err);
  });

  // ============================================================
  // 5. ОБРАБОТКА КАДРОВ: привязка к лицу
  // ============================================================
  let lastLandmarks = null;

  faceMesh.onResults((results) => {
    // Рисуем видео на canvas (фон)
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
      const landmarks = results.multiFaceLandmarks[0];
      lastLandmarks = landmarks;

      // Берём 3 ключевые точки для позиционирования:
      // 1 — кончик носа, 152 — подбородок, 10 — лоб
      const nose = landmarks[1];
      const chin = landmarks[152];
      const forehead = landmarks[10];

      // Вычисляем центр головы (между лбом и подбородком)
      const cx = (forehead.x + chin.x) / 2;
      const cy = (forehead.y + chin.y) / 2;
      const cz = (forehead.z + chin.z) / 2;

      // Размер головы (расстояние лоб-подбородок) для масштаба
      const headSize = Math.sqrt(
        Math.pow(forehead.x - chin.x, 2) +
        Math.pow(forehead.y - chin.y, 2) +
        Math.pow(forehead.z - chin.z, 2)
      );

      // Поворот по направлению носа
      const noseDir = {
        x: nose.x - cx,
        y: nose.y - cy,
        z: nose.z - cz
      };

      // Переводим в координаты THREE (y вверх, z на нас)
      // Нормализуем координаты из [0,1] в экранные
      const scale = 2.0; // коэффициент для Three.js
      const posX = (cx - 0.5) * 2 * scale;
      const posY = -(cy - 0.5) * 2 * scale;
      const posZ = cz * 5;

      if (model) {
        // Позиция
        model.position.set(posX, posY, posZ - 0.5);
        
        // Масштаб относительно размера головы
        const s = headSize * 4.5;
        model.scale.set(s, s, s);

        // Поворот (следим за носом)
        const angleY = Math.atan2(noseDir.x, noseDir.z);
        const angleX = Math.atan2(noseDir.y, noseDir.z);
        model.rotation.set(angleX * 0.5, -angleY * 0.5, 0);
      }

      document.getElementById('status').textContent = '😊 
 Лицо найдено!';
    } else {
      document.getElementById('status').textContent = '😐 Лицо не обнаружено';
    }

    // Рендерим 3D сцену поверх видео
    renderer.render(scene, camera3D);
  });

  // ============================================================
  // 6. ЗАПУСК
  // ============================================================
  async function init() {
    const ok = await startCamera();
    if (!ok) return;

    // Настройка размера canvas
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    renderer.setSize(canvas.width, canvas.height);
    camera3D.aspect = canvas.width / canvas.height;
    camera3D.updateProjectionMatrix();

    // Запускаем MediaPipe
    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({ image: video });
      },
      width: 640,
      height: 480
    });
    camera.start();
  }

  // Подключаем GLTFLoader (загружаем динамически)
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  document.head.appendChild(script);
  script.onload = init;
</script>

</body>
</html>
