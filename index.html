<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Маска на лицо</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #000;
      touch-action: none;
    }
    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #000;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      /* Критично для iOS */
      -webkit-transform: scaleX(-1);
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      -webkit-transform: scaleX(-1);
      pointer-events: none;
    }
    #status {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      font-family: -apple-system, Arial, sans-serif;
      text-shadow: 0 0 20px rgba(0,0,0,0.9);
      font-size: 16px;
      padding: 12px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      margin: 0 20px;
      pointer-events: none;
      z-index: 10;
    }
    #startBtn {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 40px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 4px 20px rgba(0,122,255,0.4);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #startBtn:active {
      transform: translateX(-50%) scale(0.95);
    }
  </style>
</head>
<body>

<div id="container">
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">👆 Нажмите кнопку для запуска</div>
  <button id="startBtn">Запустить AR</button>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // ============================================================
  // 1. НАСТРОЙКИ — вставьте ссылку на вашу GLB-модель
  // ============================================================
  const MODEL_URL = 'https://raw.githubusercontent.com/faerlou.github.io/Mask/main/mask.glb';
  // Для своей модели: загрузите на GitHub и укажите RAW-ссылку
  // Пример: https://raw.githubusercontent.com/ваш-аккаунт/репозиторий/main/mask.glb

  // ============================================================
  // 2. ЭЛЕМЕНТЫ
  // ============================================================
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('startBtn');

  let model = null;
  let faceMesh = null;
  let cameraHelper = null;
  let isRunning = false;

  // ============================================================
  // 3. THREE.JS СЦЕНА
  // ============================================================
  const scene = new THREE.Scene();
  
  // Освещение
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(0, 1, 2);
  scene.add(dirLight);
  const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
  backLight.position.set(0, 0, -1);
  scene.add(backLight);

  const camera3D = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: canvas, 
    alpha: true, 
    antialias: true 
  });

  // ============================================================
  // 4. ЗАГРУЗКА МОДЕЛИ
  // ============================================================
  function loadModel() {
    statusEl.textContent = '⏳ Загрузка модели...';
    
    // Динамически подключаем GLTFLoader
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    script.onload = () => {
      const loader = new THREE.GLTFLoader();
      loader.load(MODEL_URL, (gltf) => {
        model = gltf.scene;
        model.scale.set(2.5, 2.5, 2.5);
        scene.add(model);
        statusEl.textContent = '✅ Маска загружена! Наведите камеру на лицо';
        console.log('✅ Модель загружена');
      }, undefined, (err) => {
        statusEl.textContent = '❌ Ошибка загрузки модели: ' + err.message;
        console.error('Ошибка:', err);
      });
    };
    document.head.appendChild(script);
  }

  // ============================================================
  // 5. ЗАПУСК КАМЕРЫ (фикс для iOS)
  // ============================================================
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: 'user',
          width: { ideal: 640 },
          height: { ideal: 480 }
        }
      });
      
      video.srcObject = stream;
      
      // КРИТИЧНО для iOS: явный вызов play()
      await video.play();
      
      // Настройка canvas под размер видео
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      renderer.setSize(canvas.width, canvas.height);
      camera3D.aspect = canvas.width / canvas.height;
      camera3D.updateProjectionMatrix();
      
      statusEl.textContent = '📷 Камера запущена, инициализация распознавания...';
      return true;
    } catch(e) {
      statusEl.textContent = '❌ Ошибка камеры: ' + e.message;
      console.error('Ошибка камеры:', e);
      return false;
    }
  }

  // ============================================================
  // 6. MEDIAPIPE FACE MESH
  // ============================================================
  function initFaceMesh() {
    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults((results) => {
      // Очищаем canvas и рисуем видео
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        
        // Ключевые точки: нос (1), подбородок (152), лоб (10)
        const nose = landmarks[1];
        const chin = landmarks[152];
        const forehead = landmarks[10];

        // Центр головы
        const cx = (forehead.x + chin.x) / 2;
        const cy = (forehead.y + chin.y) / 2;
        const cz = (forehead.z + chin.z) / 2;

        // Размер головы
        const headSize = Math.sqrt(
          Math.pow(forehead.x - chin.x, 2) +
          Math.pow(forehead.y - chin.y, 2) +
          Math.pow(forehead.z - chin.z, 2)
        );

        // Направление носа для поворота
        const noseDir = {
          x: nose.x - cx,
          y: nose.y - cy,
          z: nose.z - cz
        };

        if (model) {
          // Позиция в 3D пространстве
          const scale = 2.0;
19:53
model.position.set(
            (cx - 0.5) * 2 * scale,
            -(cy - 0.5) * 2 * scale,
            cz * 5 - 0.5
          );
          
          // Масштаб
          const s = headSize * 4.5;
          model.scale.set(s, s, s);

          // Поворот
          model.rotation.set(
            Math.atan2(noseDir.y, noseDir.z) * 0.5,
            -Math.atan2(noseDir.x, noseDir.z) * 0.5,
            0
          );
        }

        statusEl.textContent = '😊 
 Лицо найдено!';
      } else {
        statusEl.textContent = '😐 Лицо не обнаружено';
      }

      renderer.render(scene, camera3D);
    });
  }

  // ============================================================
  // 7. ЗАПУСК MEDIAPIPE КАМЕРЫ
  // ============================================================
  function startMediaPipe() {
    cameraHelper = new Camera(video, {
      onFrame: async () => {
        if (faceMesh) {
          await faceMesh.send({ image: video });
        }
      },
      width: 640,
      height: 480
    });
    cameraHelper.start();
  }

  // ============================================================
  // 8. ГЛАВНАЯ ФУНКЦИЯ (запуск по кнопке)
  // ============================================================
  async function init() {
    if (isRunning) return;
    isRunning = true;
    startBtn.style.display = 'none';

    statusEl.textContent = '📷 Запуск камеры...';
    
    const cameraOk = await startCamera();
    if (!cameraOk) {
      startBtn.style.display = 'block';
      isRunning = false;
      return;
    }

    initFaceMesh();
    loadModel();
    startMediaPipe();
  }

  // ============================================================
  // 9. КНОПКА ЗАПУСКА (обязательное взаимодействие для iOS)
  // ============================================================
  startBtn.addEventListener('click', init);
  
  // Для десктопа можно запустить автоматически, но для iOS — только по клику
  // Поэтому просто ждём нажатия кнопки

  console.log('📱 
 Приложение готово. Нажмите кнопку для запуска.');
</script>

</body>
</html>
