<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>WebAR Mask</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>

    <style>

        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
        }
    </style>

</head>

<body>

    <a-scene mindar-face="autoStart:true"
             embedded
             renderer="colorManagement:true;
physicallyCorrectLights:true"
             vr-mode-ui="enabled:false"
             device-orientation-permission-ui="enabled:false">

        <a-assets>

            <a-asset-item id="mask"
                          src="mask.glb">
            </a-asset-item>

        </a-assets>

        <a-camera active="false"></a-camera>

        <!-- Переносица -->
        <a-entity mindar-face-target="anchorIndex:168">

            <a-gltf-model src="#mask"
                          position="0 0.25 0"
                          rotation="0 0 0"
                          scale="2.6 2.6 2.6"
                          shadow>

            </a-gltf-model>

        </a-entity>

        <!-- Свет -->

        <a-light type="ambient"
                 intensity="1">
        </a-light>

        <a-light type="directional"
                 intensity="0.8"
                 position="1 2 1">
        </a-light>

    </a-scene>

</body>

</html>
