<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Подключаем A-Frame и MindAR -->
    <script src="https://aframe.io"></script>
    <script src="https://jsdelivr.net"></script>
  </head>
  <body>
    <!-- Инициализируем face-tracking -->
    <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <!-- Загружаем вашу 3D модель брелка-маски -->
        <a-asset-item id="maskModel" src="mask.glb"></a-asset-item>
      </a-assets>

      <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Привязываем модель к определенной точке лица (anchorIndex: 168 — это переносица) -->
      
        <!-- Корректируем позицию, поворот и масштаб модели под лицо -->
        <a-gltf-model rotation="0 0 0" position="0 0 0" scale="1 1 1" src="#maskModel"></a-gltf-model>
      
    </a-scene>
