<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">

    <title>AR Mask</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #container {
            position: fixed;
            inset: 0;
            overflow: hidden;
        }

        #video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #threeCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1);
            z-index: 2;
        }

        #status {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,.6);
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 10;
            font-family: -apple-system,sans-serif;
        }

        #startBtn {
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            border: none;
            border-radius: 30px;
            padding: 18px 40px;
            background: #007AFF;
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="container">

        <video id="video"
               autoplay
               muted
               playsinline
               webkit-playsinline>
        </video>

        <canvas id="threeCanvas"></canvas>

        <button id="startBtn">
            ▶ Запустить AR
        </button>

        <div id="status">
            Нажмите кнопку запуска
        </div>

    </div>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>

        const MODEL_URL = "./mask.glb";

        const video = document.getElementById("video");
        const canvas = document.getElementById("threeCanvas");
        const statusEl = document.getElementById("status");
        const startBtn = document.getElementById("startBtn");

        let model = null;
        let faceMesh = null;
        let running = false;

        // ======================
        // THREE
        // ======================

        const scene = new THREE.Scene();

        const camera3D = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            100
        );

        camera3D.position.z = 5;

        const renderer = new THREE.WebGLRenderer({
            canvas,
            alpha: true,
            antialias: true
        });

        renderer.setPixelRatio(
            Math.min(window.devicePixelRatio, 2)
        );

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        const ambient = new THREE.AmbientLight(
            0xffffff,
            1.2
        );
        scene.add(ambient);

        const light1 = new THREE.DirectionalLight(
            0xffffff,
            1
        );
        light1.position.set(0, 1, 2);
        scene.add(light1);

        // ======================
        // MODEL
        // ======================

        function loadModel() {

            return new Promise((resolve, reject) => {

                const loader = new THREE.GLTFLoader();

                loader.load(

                    MODEL_URL,

                    (gltf) => {

                        model = gltf.scene;

                        model.scale.set(
                            1,
                            1,
                            1
                        );

                        scene.add(model);

                        resolve();
                    },

                    undefined,

                    (err) => {
                        reject(err);
                    }

                );

            });

        }

        // ======================
        // CAMERA
        // ======================

        async function startCamera() {

            const stream =
                await navigator.mediaDevices.getUserMedia({

                    video: {
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },

                    audio: false

                });

            video.srcObject = stream;

            await video.play();

        }

        // ======================
        // FACEMESH
        // ======================

        function createFaceMesh() {

            faceMesh = new FaceMesh({

                locateFile: (file) =>
                    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`

            });

            faceMesh.setOptions({

                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.5

            });

            faceMesh.onResults(onResults);

        }

        // ======================
        // FACE TRACKING
        // ======================

        function onResults(results) {

            if (
                !results.multiFaceLandmarks ||
                !results.multiFaceLandmarks.length
            ) {
                statusEl.textContent = "Лицо не найдено";
                return;
            }

            const lm = results.multiFaceLandmarks[0];

            const nose = lm[1];
            const forehead = lm[10];
            const chin = lm[152];

            if (!model) return;

            const cx = (forehead.x + chin.x) * 0.5;
            const cy = (forehead.y + chin.y) * 0.5;

            const size = Math.sqrt(

                Math.pow(forehead.x - chin.x, 2) +
                Math.pow(forehead.y - chin.y, 2)

            );

            model.visible = true;

            model.position.x = (cx - 0.5) * 6;
            model.position.y = -(cy - 0.5) * 6;
            model.position.z = -2;

            const scale = size * 10;

            model.scale.set(
                scale,
                scale,
                scale
            );

            const rotY =
                -(nose.x - cx) * 5;

            const rotX =
                (nose.y - cy) * 3;

            model.rotation.set(
                rotX,
                rotY,
                0
            );

            statusEl.textContent = "Лицо найдено";

        }

        // ======================
        // LOOP
        // ======================

        async function detectLoop() {

            if (!running) return;

            await faceMesh.send({
                image: video
            });

            requestAnimationFrame(
                detectLoop
            );

        }

        function renderLoop() {

            requestAnimationFrame(
                renderLoop
            );

            renderer.render(
                scene,
                camera3D
            );

        }

        // ======================
        // START
        // ======================

        async function startAR() {

            if (running) return;

            try {

                running = true;

                startBtn.classList.add(
                    "hidden"
                );

                statusEl.textContent =
                    "Запуск камеры...";

                await startCamera();

                statusEl.textContent =
                    "Загрузка модели...";

                await loadModel();

                statusEl.textContent =
                    "Запуск FaceMesh...";

                createFaceMesh();

                detectLoop();

                renderLoop();

                statusEl.textContent =
                    "Наведите камеру на лицо";

            }
            catch (err) {

                console.error(err);

                statusEl.textContent =
                    "Ошибка: " + err.message;

                startBtn.classList.remove(
                    "hidden"
                );

                running = false;

            }

        }

        startBtn.addEventListener(
            "click",
            startAR
        );

        // iPhone resize

        window.addEventListener(
            "resize",
            () => {

                camera3D.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera3D.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );

            }
        );

    </script>

</body>
</html>
